# AWS Amplify — Next.js (App Router, SSR)
# Ajusta variables de entorno (p. ej. NEXT_PUBLIC_*) en la consola de Amplify: App → Environment variables

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
