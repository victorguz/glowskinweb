# AWS Amplify — cabeceras HTTP para SEO, archivos planos y seguridad.
# Next.js sirve /robots.txt y /sitemap.xml vía App Router; estas reglas refuerzan tipos MIME y caché en CDN.

customHeaders:
  - pattern: "/robots.txt"
    headers:
      - key: "Content-Type"
        value: "text/plain; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=86400, stale-while-revalidate=604800"

  - pattern: "/sitemap.xml"
    headers:
      - key: "Content-Type"
        value: "application/xml; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=3600, stale-while-revalidate=86400"

  - pattern: "/llms.txt"
    headers:
      - key: "Content-Type"
        value: "text/plain; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=86400"

  - pattern: "/.well-known/security.txt"
    headers:
      - key: "Content-Type"
        value: "text/plain; charset=utf-8"
      - key: "Cache-Control"
        value: "public, max-age=86400"

  - pattern: "**/*.{png,jpg,jpeg,gif,svg,webp,ico,woff2}"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
      - key: "X-Content-Type-Options"
        value: "nosniff"

  - pattern: "**/*"
    headers:
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - key: "Permissions-Policy"
        value: "camera=(), microphone=(), geolocation=()"
